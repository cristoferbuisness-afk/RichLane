<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
overflow:hidden;
color:white;
background:linear-gradient(135deg,#1e1e2f,#3a0ca3,#7209b7);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:8px;
}

button{
margin-top:25px;
padding:12px 35px;
border-radius:40px;
border:none;
background:linear-gradient(45deg,#d4af37,#f5e6a3);
color:black;
font-weight:600;
cursor:pointer;
}

input{
margin-top:15px;
padding:12px;
border-radius:30px;
border:none;
width:250px;
text-align:center;
}

.gold{
border:2px solid gold;
color:gold;
}

#launch,#welcome,#shop{
display:none;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
padding:20px;
}

.product{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:20px;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,0.6);
padding:20px;
border-radius:20px;
width:220px;
}
</style>
</head>

<body>

<div id="intro" class="center">
<h1>RICH LANE</h1>
<button id="enterBtn">ENTER</button>
</div>

<div id="launch" class="center">
<h1 id="timer">01:00</h1>
<input id="email" placeholder="Enter Gmail">
<br>
<input id="code" placeholder="Early Access Code">
<div id="codesLeft">Codes left: 150</div>
<br>
<button id="instaBtn">Instagram</button>
</div>

<div id="welcome" class="center">
<h1>Welcome to Rich Lane</h1>
<button id="welcomeEnter">ENTER</button>
</div>

<div id="shop">
<h1 style="text-align:center;margin-top:40px;">RICH LANE</h1>
<div class="products" id="products"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="total">Total: 0 SEK</div>
<button id="checkoutBtn">Checkout</button>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

let intro=document.getElementById("intro");
let launch=document.getElementById("launch");
let welcome=document.getElementById("welcome");
let shop=document.getElementById("shop");
let enterBtn=document.getElementById("enterBtn");
let welcomeEnter=document.getElementById("welcomeEnter");
let timerEl=document.getElementById("timer");
let email=document.getElementById("email");
let code=document.getElementById("code");
let codesLeft=document.getElementById("codesLeft");
let instaBtn=document.getElementById("instaBtn");

enterBtn.onclick=function(){
intro.style.display="none";
launch.style.display="block";
startTimer();
};

instaBtn.onclick=function(){
window.open("https://instagram.com/RichLaneCo","_blank");
};

let seconds=60;
let interval;
function startTimer(){
interval=setInterval(function(){
seconds--;
let m=Math.floor(seconds/60);
let s=seconds%60;
timerEl.innerText=`0${m}:${s<10?"0"+s:s}`;
if(seconds<=0){
clearInterval(interval);
launch.style.display="none";
welcome.style.display="block";
}
},1000);
}

let codes=150;

email.addEventListener("input",function(){
if(email.value.endsWith("@gmail.com")){
email.classList.add("gold");
}else{
email.classList.remove("gold");
}
});

code.addEventListener("input",function(){
if(code.value==="RICHLANE" && codes>0){
code.classList.add("gold");
codes--;
codesLeft.innerText="Codes left: "+codes;
}else{
code.classList.remove("gold");
}
});

welcomeEnter.onclick=function(){
welcome.style.display="none";
shop.style.display="block";
document.body.style.overflow="auto";
loadProducts();
};

let cart=[];

function loadProducts(){
let items=[
{name:"Luxury Hoodie",price:1299},
{name:"Signature Tee",price:699},
{name:"Premium Jacket",price:2499}
];

items.forEach(function(p){
let div=document.createElement("div");
div.className="product";
div.innerHTML=`
<h3>${p.name}</h3>
<p>${p.price} SEK</p>
<button>Add to Cart</button>
`;
div.querySelector("button").onclick=function(){
addToCart(p.name,p.price);
};
document.getElementById("products").appendChild(div);
});
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let cartItems=document.getElementById("cartItems");
let totalEl=document.getElementById("total");
cartItems.innerHTML="";
let total=0;

cart.forEach(function(item,index){
total+=item.price;
let div=document.createElement("div");
div.innerHTML=`
${item.name} - ${item.price} SEK 
<button>X</button>
`;
div.querySelector("button").onclick=function(){
cart.splice(index,1);
renderCart();
};
cartItems.appendChild(div);
});

totalEl.innerText="Total: "+total+" SEK";
}

document.getElementById("checkoutBtn").onclick=function(){
alert("Checkout requires Stripe backend integration.");
};

});
</script>

</body>
</html>
