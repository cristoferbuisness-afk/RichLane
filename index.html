<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
color:white;
background:radial-gradient(circle at center,#1a1a2e,#0f0f1a);
height:100vh;
}

/* Mouse glow */
.cursor-glow{
position:fixed;
width:300px;
height:300px;
background:radial-gradient(circle,rgba(212,175,55,0.25),transparent 70%);
pointer-events:none;
transform:translate(-50%,-50%);
z-index:1;
}

/* Smoke particles */
.particle{
position:fixed;
width:6px;
height:6px;
background:rgba(255,255,255,0.08);
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5);opacity:0}
50%{opacity:1}
100%{transform:translateY(-10vh) scale(1.2);opacity:0}
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:2;
width:90%;
}

h1{
font-size:60px;
letter-spacing:8px;
margin-bottom:20px;
}

button{
padding:12px 35px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#d4af37,#f5e6a3);
color:black;
font-weight:bold;
cursor:pointer;
margin-top:15px;
}

input{
padding:12px;
border-radius:25px;
border:none;
width:250px;
text-align:center;
margin-top:15px;
}

.gold{
border:2px solid gold;
color:gold;
}

#launch,#welcome,#shop{
display:none;
}

.flash{
position:fixed;
width:100%;
height:100%;
background:white;
top:0;
left:0;
opacity:0;
z-index:5;
pointer-events:none;
}

.shatter{
animation:shake 0.1s infinite;
}

@keyframes shake{
0%{transform:translate(2px,2px)}
50%{transform:translate(-2px,-2px)}
100%{transform:translate(2px,-2px)}
}

/* SHOP */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:40px;
}

.product{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
backdrop-filter:blur(10px);
}

.cart{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
padding:20px;
border-radius:15px;
width:230px;
}
</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>
<div class="flash" id="flash"></div>

<div id="intro" class="center">
<h1>RICH LANE</h1>
<button id="enterBtn">ENTER</button>
</div>

<div id="launch" class="center">
<h1 id="timer">01:00</h1>
<input id="email" placeholder="Enter Gmail">
<br>
<input id="code" placeholder="Early Access Code">
<div id="codesLeft">Codes left: 150</div>
<br>
<button id="instaBtn">Instagram</button>
</div>

<div id="welcome" class="center">
<h1>Welcome to Rich Lane</h1>
<button id="welcomeBtn">ENTER SHOP</button>
</div>

<div id="shop">
<h1 style="text-align:center;margin-top:40px;">RICH LANE SHOP</h1>
<div class="products" id="products"></div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="total">Total: 0 SEK</div>
<button id="checkoutBtn">Checkout</button>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

/* Mouse glow */
document.addEventListener("mousemove",function(e){
let glow=document.getElementById("glow");
glow.style.left=e.clientX+"px";
glow.style.top=e.clientY+"px";
});

/* Smoke */
for(let i=0;i<30;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(p);
}

let intro=document.getElementById("intro");
let launch=document.getElementById("launch");
let welcome=document.getElementById("welcome");
let shop=document.getElementById("shop");
let flash=document.getElementById("flash");

let enterBtn=document.getElementById("enterBtn");
let welcomeBtn=document.getElementById("welcomeBtn");
let timerEl=document.getElementById("timer");
let email=document.getElementById("email");
let code=document.getElementById("code");
let codesLeft=document.getElementById("codesLeft");
let instaBtn=document.getElementById("instaBtn");

enterBtn.onclick=function(){
intro.style.display="none";
launch.style.display="block";
startTimer();
};

instaBtn.onclick=function(){
window.open("https://instagram.com/RichLaneCo","_blank");
};

let seconds=60;
let interval;
function startTimer(){
interval=setInterval(function(){
seconds--;
let m=Math.floor(seconds/60);
let s=seconds%60;
timerEl.innerText="0"+m+":"+(s<10?"0"+s:s);

if(seconds<=0){
clearInterval(interval);
shatterEffect();
}
},1000);
}

function shatterEffect(){
document.body.classList.add("shatter");
setTimeout(()=>{
flash.style.opacity="1";
setTimeout(()=>{
flash.style.opacity="0";
launch.style.display="none";
welcome.style.display="block";
document.body.classList.remove("shatter");
},1000);
},2000);
}

let codes=150;

email.addEventListener("input",function(){
if(email.value.endsWith("@gmail.com")){
email.classList.add("gold");
}else{
email.classList.remove("gold");
}
});

code.addEventListener("input",function(){
if(code.value==="RICHLANE" && codes>0){
code.classList.add("gold");
codes--;
codesLeft.innerText="Codes left: "+codes;
}else{
code.classList.remove("gold");
}
});

welcomeBtn.onclick=function(){
welcome.style.display="none";
shop.style.display="block";
document.body.style.overflow="auto";
loadProducts();
};

let cart=[];

function loadProducts(){
let items=[
{name:"Luxury Hoodie",price:1299},
{name:"Signature Tee",price:699},
{name:"Premium Jacket",price:2499}
];

items.forEach(function(p){
let div=document.createElement("div");
div.className="product";
div.innerHTML="<h3>"+p.name+"</h3><p>"+p.price+" SEK</p>";
let btn=document.createElement("button");
btn.innerText="Add to Cart";
btn.onclick=function(){addToCart(p.name,p.price)};
div.appendChild(btn);
document.getElementById("products").appendChild(div);
});
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let cartItems=document.getElementById("cartItems");
let totalEl=document.getElementById("total");
cartItems.innerHTML="";
let total=0;

cart.forEach(function(item,index){
total+=item.price;
let div=document.createElement("div");
div.innerHTML=item.name+" - "+item.price+" SEK ";
let btn=document.createElement("button");
btn.innerText="X";
btn.onclick=function(){
cart.splice(index,1);
renderCart();
};
div.appendChild(btn);
cartItems.appendChild(div);
});

totalEl.innerText="Total: "+total+" SEK";
}

document.getElementById("checkoutBtn").onclick=function(){
alert("Stripe backend required for real payments.");
};

});
</script>

</body>
</html>
