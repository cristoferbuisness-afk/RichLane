<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
color:#fff;
overflow:hidden;
background:#000;
cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
position:fixed;
width:25px;
height:25px;
border:2px solid #d4af37;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:99999;
box-shadow:0 0 15px rgba(212,175,55,.6);
}

/* PARTICLES */
.particle{
position:fixed;
width:6px;
height:6px;
background:#d4af37;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

/* BACKGROUND */
.background{
position:fixed;
width:110%;
height:110%;
top:-5%;
left:-5%;
background:url("Rich Lane clothes Photo Clouds.png") center/cover no-repeat;
filter:brightness(0.45);
z-index:-3;
transition:transform .2s ease;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(0,0,0,.4), #000 85%);
z-index:-1;
}

/* FOG */
.fog{
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:radial-gradient(circle at center, rgba(255,255,255,.05) 10%, transparent 60%);
z-index:-2;
transition:transform .3s ease;
animation:fogMove 80s linear infinite;
}

@keyframes fogMove{
0%{transform:translateX(0)}
100%{transform:translateX(-15%)}
}

section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
transition:1.2s ease;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:8px;
}

.enter-btn, button{
margin-top:30px;
padding:15px 50px;
border-radius:50px;
border:none;
font-size:14px;
letter-spacing:4px;
cursor:pointer;
background:linear-gradient(45deg,#d4af37,#f5d77a);
color:#000;
transition:.4s;
}

.enter-btn:hover, button:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(212,175,55,.6);
}

.countdown{
display:flex;
gap:15px;
margin:30px 0;
}

.countdown div{
background:rgba(255,255,255,.05);
padding:15px 20px;
border-radius:20px;
}

.glitch{
animation:glitchFlash .2s infinite;
}

@keyframes glitchFlash{
0%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0)}
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="background" id="bg"></div>
<div class="fog" id="fog"></div>
<div class="overlay"></div>

<section id="intro">
<h1>RICH LANE</h1>
<button class="enter-btn" onclick="enterSite()">ENTER</button>
</section>

<section id="early" class="hidden">
<h1 id="mainTitle">EARLY ACCESS</h1>

<div class="countdown">
<div><span id="months">0</span><br>MO</div>
<div><span id="days">0</span><br>D</div>
<div><span id="hours">0</span><br>H</div>
<div><span id="minutes">0</span><br>M</div>
<div><span id="seconds">0</span><br>S</div>
</div>
</section>

<script>

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

/* PARALLAX */
document.addEventListener("mousemove",e=>{
let x=(window.innerWidth/2 - e.pageX)/40;
let y=(window.innerHeight/2 - e.pageY)/40;
document.getElementById("bg").style.transform=
"translate("+x+"px,"+y+"px) scale(1.05)";
document.getElementById("fog").style.transform=
"translate("+x*2+"px,"+y*2+"px)";
});

/* GOLD PARTICLE EXPLOSION */
function explodeParticles(x,y){
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
document.body.appendChild(p);
p.style.left=x+"px";
p.style.top=y+"px";
let angle=Math.random()*2*Math.PI;
let distance=100+Math.random()*100;
let dx=Math.cos(angle)*distance;
let dy=Math.sin(angle)*distance;
p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:"translate("+dx+"px,"+dy+"px)",opacity:0}
],{duration:1000,easing:"ease-out"});
setTimeout(()=>p.remove(),1000);
}
}

/* CINEMATIC BASS + HEARTBEAT */
let audioCtx;
function startHeartbeat(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
setInterval(()=>{
let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();
osc.frequency.value=50;
gain.gain.value=.4;
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+.5);
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.start();
osc.stop(audioCtx.currentTime+.5);
},2000);
}

function enterSite(e){
explodeParticles(window.innerWidth/2,window.innerHeight/2);
startHeartbeat();
document.getElementById("intro").classList.add("hidden");
document.getElementById("early").classList.remove("hidden");
}

/* COUNTDOWN */
const dropDate=new Date("July 1, 2026 18:00:00").getTime();

setInterval(function(){
const now=new Date().getTime();
const distance=dropDate-now;

if(distance<=0){
document.getElementById("mainTitle").classList.add("glitch");
return;
}

document.getElementById("months").innerHTML=Math.floor(distance/(1000*60*60*24*30));
document.getElementById("days").innerHTML=Math.floor((distance%(1000*60*60*24*30))/(1000*60*60*24));
document.getElementById("hours").innerHTML=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
document.getElementById("minutes").innerHTML=Math.floor((distance%(1000*60*60))/(1000*60));
document.getElementById("seconds").innerHTML=Math.floor((distance%(1000*60))/1000);

},1000);

</script>

</body>
</html>
