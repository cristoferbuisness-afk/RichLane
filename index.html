<!doctype html>
<html class="no-js" lang="en">

<head>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rich Lane</title>

<meta name="description" content="Rich Lane represents discipline, focus, and earned position. Premium apparel for those who lead with confidence and move with intention. Not for everyone.">

<link rel="canonical" href="https://cristoferbuisness-afk.github.io/RichLane/">

<link rel="shortcut icon" type="image/x-icon" href="Rich Lane clothes Photo Clouds.png">
<link rel="apple-touch-icon" href="Rich Lane clothes Photo Clouds.png">

<style>
body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: Helvetica, Arial, sans-serif;
    overflow: hidden;
}

.hero {
    position: relative;
    height: 100vh;
    background: url("Rich Lane clothes Photo Clouds.png") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.overlay {
    background: rgba(0,0,0,0.6);
    position: absolute;
    inset: 0;
}

.content {
    position: relative;
    z-index: 2;
    animation: fadeIn 2s ease forwards;
}

h1 {
    font-size: 64px;
    letter-spacing: 10px;
    margin: 0;
}

p {
    font-size: 18px;
    margin-top: 15px;
    opacity: 0.85;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="hero">
    <div class="overlay"></div>

    <div class="content">
        <h1>RICH LANE</h1>
        <p>Discipline. Precision. Position.</p>
        <p>Not for everyone.</p>
    </div>
</div>

</body>
</html>
