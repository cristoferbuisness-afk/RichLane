<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Lane</title>
  <meta name="description" content="Rich Lane represents discipline, precision, and understated power. A refined apparel brand for those who build in silence and lead with intention. Not for everyone.">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    img {
      width: 300px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 48px;
      letter-spacing: 6px;
      margin: 0;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 10px;
    }

    .coming-soon {
      margin-top: 25px;
      opacity: 0;
      letter-spacing: 3px;
      animation: fadeUp 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 0.5;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div>
    <img src="Rich Lane clothes Photo Clouds.png" alt="Rich Lane">

    <h1>RICH LANE</h1>
    <p>Discipline. Precision. Position.</p>
    <p>Not for everyone.</p>
    <p class="coming-soon">COMING SOON</p>
  </div>
</body>
</html>
