<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:#fff;
overflow:hidden;
cursor:none;
}

.gold{color:#d4af37;}
.red{color:#ff4d4d;}

.cursor{
position:fixed;
width:20px;
height:20px;
border:2px solid #d4af37;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
box-shadow:0 0 15px rgba(212,175,55,.7);
}

.background{
position:fixed;
width:110%;
height:110%;
top:-5%;
left:-5%;
background:#000;
z-index:-3;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(0,0,0,.4), #000 85%);
z-index:-1;
}

section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:1s ease;
padding:20px;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

.brand{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:10px;
margin-bottom:10px;
}

.title{
font-size:18px;
letter-spacing:6px;
opacity:.8;
margin-bottom:20px;
}

button{
padding:14px 40px;
border-radius:50px;
border:none;
font-size:12px;
letter-spacing:3px;
cursor:pointer;
background:linear-gradient(45deg,#d4af37,#f5d77a);
color:#000;
transition:.3s;
margin-top:10px;
}

button:hover{
transform:scale(1.07);
box-shadow:0 0 25px rgba(212,175,55,.6);
}

.countdown{
display:flex;
gap:15px;
margin:25px 0;
}

.countdown div{
background:rgba(255,255,255,.05);
padding:15px 18px;
border-radius:20px;
min-width:55px;
}

input{
padding:12px 20px;
border-radius:30px;
border:none;
margin-top:10px;
width:250px;
text-align:center;
outline:none;
}

.message{
margin-top:10px;
font-size:14px;
}

.remaining{
margin-top:8px;
font-size:12px;
opacity:.7;
}

.shop{
opacity:0;
transform:scale(.95);
transition:1s ease;
margin-top:20px;
}

.shop.show{
opacity:1;
transform:scale(1);
}

.product{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:20px;
margin-top:15px;
}

.instagram-link{
margin-top:25px;
font-size:14px;
letter-spacing:2px;
color:#d4af37;
text-decoration:none;
transition:.3s ease;
display:inline-block;
}

.instagram-link:hover{
text-shadow:0 0 12px rgba(212,175,55,.8);
transform:scale(1.05);
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="background"></div>
<div class="overlay"></div>

<section id="intro">
<h1 class="brand">RICH LANE</h1>
<button onclick="enterSite()">ENTER</button>
</section>

<section id="early" class="hidden">
<h1 class="brand">RICH LANE</h1>
<div class="title" id="countTitle">EARLY ACCESS</div>

<div class="countdown">
<div><span id="minutes">5</span><br>M</div>
<div><span id="seconds">0</span><br>S</div>
</div>

<div class="remaining" id="remainingText"></div>

<input type="email" id="email" placeholder="Enter your email">
<button onclick="generateCode()">Request Code</button>

<input type="text" id="codeInput" placeholder="Enter your code">
<button onclick="validateCode()">Unlock Access</button>

<div class="message" id="msg"></div>

<div class="shop" id="shop">
<h2 class="gold">EARLY ACCESS SHOP</h2>
<div class="product">
Luxury Hoodie – Early Drop Edition  
<br><br>
<button>Pre-Order</button>
</div>
</div>

<a href="https://www.instagram.com/richlaneco/" 
   target="_blank" 
   rel="noopener noreferrer"
   class="instagram-link">
   Follow us on Instagram @RichLaneCo
</a>

</section>

<script>

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

/* ENTER */
function enterSite(){
document.getElementById("intro").classList.add("hidden");
document.getElementById("early").classList.remove("hidden");
startCountdown();
}

/* 5 MINUTE COUNTDOWN */
let countdownInterval;

function startCountdown(){
let timeLeft = 300; // 5 minutes = 300 seconds

countdownInterval = setInterval(()=>{
let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

if(timeLeft <= 0){
clearInterval(countdownInterval);
document.getElementById("countTitle").innerHTML = "DROP LIVE";
document.getElementById("countTitle").classList.add("gold");
}

timeLeft--;
},1000);
}

/* EARLY ACCESS SYSTEM */
const TOTAL_CODES=150;
let codes=JSON.parse(localStorage.getItem("rl_codes"))||[];

function updateRemaining(){
document.getElementById("remainingText").innerText=
"Limited spots remaining: "+(TOTAL_CODES-codes.length)+" / "+TOTAL_CODES;
}
updateRemaining();

function validEmail(email){
return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function generateCode(){
let email=document.getElementById("email").value;
let msg=document.getElementById("msg");

if(!validEmail(email)){
msg.innerHTML="<span class='red'>Invalid email.</span>";
return;
}

if(codes.length>=TOTAL_CODES){
msg.innerHTML="<span class='red'>Early access full.</span>";
return;
}

let code="RL-"+Math.random().toString(36).substring(2,8).toUpperCase();
codes.push({email:email,code:code,used:false});
localStorage.setItem("rl_codes",JSON.stringify(codes));

msg.innerHTML="<span class='gold'>Valid Gmail ✔</span><br><span class='gold'>Your code: "+code+"</span>";
updateRemaining();
}

function validateCode(){
let input=document.getElementById("codeInput").value;
let msg=document.getElementById("msg");
let shop=document.getElementById("shop");

let found=codes.find(c=>c.code===input && !c.used);

if(!found){
msg.innerHTML="<span class='red'>Invalid or already used code.</span>";
return;
}

found.used=true;
localStorage.setItem("rl_codes",JSON.stringify(codes));

msg.innerHTML="<span class='gold'>Valid Code ✔ Access Granted</span>";
shop.classList.add("show");
}

</script>
</body>
</html>
