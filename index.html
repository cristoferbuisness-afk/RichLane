<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
cursor:none;
}

/* Cursor */
.cursor{
position:fixed;
width:18px;
height:18px;
border:2px solid gold;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 25px gold;
z-index:9999;
}

/* Intro */
#intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:black;
z-index:10;
}

h1{
font-family:'Playfair Display',serif;
font-size:clamp(40px,8vw,90px);
letter-spacing:12px;
}

button{
margin-top:30px;
padding:12px 40px;
border-radius:50px;
border:none;
background:linear-gradient(45deg,#d4af37,#f5e6a3);
color:black;
cursor:pointer;
}

/* Shop */
#shop{
display:none;
height:100vh;
overflow:auto;
padding:60px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.product{
background:#111;
padding:20px;
border-radius:20px;
}

.cart{
position:fixed;
right:20px;
top:20px;
background:#111;
padding:20px;
border-radius:20px;
width:250px;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div id="intro">
<h1>RICH LANE</h1>
<button onclick="start()">ENTER</button>
</div>

<div id="shop">
<h1>RICH LANE STORE</h1>

<div class="products" id="products"></div>

<h2 style="margin-top:60px;">Members Only Drop</h2>
<input id="memberPass" placeholder="Enter member code">
<button onclick="unlock()">Unlock</button>
<div id="memberProduct"></div>

<h2 style="margin-top:60px;">AI Outfit Preview</h2>
<input type="file" id="upload">
<canvas id="previewCanvas" width="300" height="400" style="background:#111;margin-top:20px;"></canvas>
</div>

<div class="cart" id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="total"></div>
<button onclick="checkout()">Checkout</button>
</div>

<script>

/* Cursor */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

/* Intro Glass Explosion */
function start(){
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z=5;

let pieces=[];
for(let i=0;i<80;i++){
let geo=new THREE.BoxGeometry(.5,.5,.05);
let mat=new THREE.MeshBasicMaterial({color:0xffffff});
let mesh=new THREE.Mesh(geo,mat);
mesh.position.set((Math.random()-0.5)*4,(Math.random()-0.5)*4,0);
scene.add(mesh);
pieces.push(mesh);
}

let frames=0;
function animate(){
requestAnimationFrame(animate);
pieces.forEach(p=>{
p.position.z+=0.3;
p.rotation.x+=0.1;
});
renderer.render(scene,camera);
frames++;
if(frames>40){
renderer.domElement.remove();
intro.style.display="none";
shop.style.display="block";
document.body.style.overflow="auto";
loadProducts();
}
}
animate();
}

/* Products */
let cart=[];
function loadProducts(){
let data=[
{name:"Luxury Hoodie",price:1299},
{name:"Signature Tee",price:699}
];
let container=document.getElementById("products");
data.forEach(p=>{
let div=document.createElement("div");
div.className="product";
div.innerHTML=`
<h3>${p.name}</h3>
<p>${p.price} SEK</p>
<button onclick='addToCart("${p.name}",${p.price})'>Add</button>
`;
container.appendChild(div);
});
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
let total=0;
cart.forEach((item,i)=>{
total+=item.price;
box.innerHTML+=`${item.name} - ${item.price}<br>`;
});
document.getElementById("total").innerText="Total: "+total+" SEK";
}

function checkout(){
alert("Stripe live backend needed 🔥");
}

/* Members Only */
function unlock(){
let code=document.getElementById("memberPass").value;
if(code==="RICHLANEVIP"){
document.getElementById("memberProduct").innerHTML=
"<div class='product'><h3>Secret Drop Jacket</h3><p>4999 SEK</p><button>Add</button></div>";
}
}

/* AI Preview */
document.getElementById("upload").addEventListener("change",function(e){
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=function(evt){
const img=new Image();
img.onload=function(){
const canvas=document.getElementById("previewCanvas");
const ctx=canvas.getContext("2d");
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0,300,400);

/* Fake hoodie overlay */
ctx.fillStyle="rgba(0,0,0,0.5)";
ctx.fillRect(80,100,140,180);
};
img.src=evt.target.result;
};
reader.readAsDataURL(file);
});

</script>
</body>
</html>
