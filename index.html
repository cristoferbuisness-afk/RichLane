<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Montserrat',sans-serif;
background:#000;
color:#fff;
overflow:hidden;
cursor:none;
}

/* CUSTOM GOLD CURSOR */
.cursor{
position:fixed;
width:24px;
height:24px;
border:2px solid #d4af37;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
z-index:9999;
box-shadow:0 0 20px rgba(212,175,55,.6);
}

/* BACKGROUND */
.background{
position:fixed;
width:110%;
height:110%;
top:-5%;
left:-5%;
background:url("Rich Lane clothes Photo Clouds.png") center/cover no-repeat;
filter:brightness(.45);
z-index:-3;
transition:.2s ease;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at center, rgba(0,0,0,.4), #000 85%);
z-index:-1;
}

.fog{
position:fixed;
width:200%;
height:200%;
top:-50%;
left:-50%;
background:radial-gradient(circle at center, rgba(255,255,255,.06), transparent 60%);
z-index:-2;
transition:.3s ease;
}

/* SECTIONS */
section{
position:absolute;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
transition:1.2s ease;
padding:20px;
}

.hidden{
opacity:0;
pointer-events:none;
transform:scale(1.05);
}

/* TEXT */
.brand{
font-family:'Playfair Display',serif;
font-size:60px;
letter-spacing:10px;
margin-bottom:10px;
}

.title{
font-size:20px;
letter-spacing:6px;
opacity:.8;
margin-bottom:25px;
}

.enter-btn, button{
padding:14px 45px;
border-radius:50px;
border:none;
font-size:13px;
letter-spacing:3px;
cursor:pointer;
background:linear-gradient(45deg,#d4af37,#f5d77a);
color:#000;
transition:.4s;
}

.enter-btn:hover, button:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(212,175,55,.6);
}

.countdown{
display:flex;
gap:15px;
margin:25px 0;
}

.countdown div{
background:rgba(255,255,255,.05);
padding:15px 20px;
border-radius:20px;
min-width:60px;
}

input{
padding:12px 20px;
border-radius:30px;
border:none;
margin-top:15px;
width:260px;
text-align:center;
outline:none;
}

.message{
margin-top:15px;
font-size:13px;
opacity:.9;
}

/* GLITCH */
.glitch{
animation:glitch .2s infinite;
}

@keyframes glitch{
0%{transform:translate(2px,-2px)}
50%{transform:translate(-2px,2px)}
100%{transform:translate(0)}
}

/* PARTICLES */
.particle{
position:fixed;
width:6px;
height:6px;
background:#d4af37;
border-radius:50%;
pointer-events:none;
z-index:999;
}
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="background" id="bg"></div>
<div class="fog" id="fog"></div>
<div class="overlay"></div>

<!-- INTRO -->
<section id="intro">
<h1 class="brand">RICH LANE</h1>
<button class="enter-btn" onclick="enterSite()">ENTER</button>
</section>

<!-- EARLY ACCESS -->
<section id="early" class="hidden">
<h1 class="brand">RICH LANE</h1>
<div class="title">EARLY ACCESS</div>

<div class="countdown">
<div><span id="months">0</span><br>MO</div>
<div><span id="days">0</span><br>D</div>
<div><span id="hours">0</span><br>H</div>
<div><span id="minutes">0</span><br>M</div>
<div><span id="seconds">0</span><br>S</div>
</div>

<input type="email" id="email" placeholder="Enter your email">
<br>
<button onclick="generateCode()">Request Early Access</button>
<div class="message" id="msg"></div>
</section>

<script>

/* CURSOR */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

/* PARALLAX + FOG */
const bg=document.getElementById("bg");
const fog=document.getElementById("fog");

document.addEventListener("mousemove",e=>{
let x=(window.innerWidth/2 - e.pageX)/40;
let y=(window.innerHeight/2 - e.pageY)/40;
bg.style.transform=`translate(${x}px,${y}px) scale(1.05)`;
fog.style.transform=`translate(${x*2}px,${y*2}px)`;
});

/* PARTICLE EXPLOSION */
function explode(x,y){
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
document.body.appendChild(p);
p.style.left=x+"px";
p.style.top=y+"px";
let angle=Math.random()*2*Math.PI;
let dist=80+Math.random()*120;
let dx=Math.cos(angle)*dist;
let dy=Math.sin(angle)*dist;
p.animate([{transform:"translate(0,0)",opacity:1},
{transform:`translate(${dx}px,${dy}px)`,opacity:0}],
{duration:1000,easing:"ease-out"});
setTimeout(()=>p.remove(),1000);
}
}

/* HEARTBEAT SOUND */
function heartbeat(){
let ctx=new (window.AudioContext||window.webkitAudioContext)();
setInterval(()=>{
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.frequency.value=45;
gain.gain.value=.4;
gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.5);
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+.5);
},2000);
}

/* ENTER */
function enterSite(){
explode(window.innerWidth/2,window.innerHeight/2);
heartbeat();
intro.classList.add("hidden");
early.classList.remove("hidden");
}

/* COUNTDOWN 5 MONTHS FROM NOW */
const dropDate=new Date();
dropDate.setMonth(dropDate.getMonth()+5);

setInterval(()=>{
let now=new Date().getTime();
let dist=dropDate-now;

if(dist<=0){
document.querySelector(".title").classList.add("glitch");
return;
}

months.innerHTML=Math.floor(dist/(1000*60*60*24*30));
days.innerHTML=Math.floor((dist%(1000*60*60*24*30))/(1000*60*60*24));
hours.innerHTML=Math.floor((dist%(1000*60*60*24))/(1000*60*60));
minutes.innerHTML=Math.floor((dist%(1000*60*60))/(1000*60));
seconds.innerHTML=Math.floor((dist%(1000*60))/1000);

},1000);

/* EARLY ACCESS CODES */
let totalCodes=333;
let used=0;

function generateCode(){
let email=document.getElementById("email").value;
let msg=document.getElementById("msg");

if(!email || !email.includes("@")){
msg.innerHTML="Enter a valid email.";
return;
}

if(used>=totalCodes){
msg.innerHTML="Early access is full.";
return;
}

used++;
let code="RL-"+Math.random().toString(36).substring(2,8).toUpperCase();
msg.innerHTML="Your exclusive code: "+code+"<br>Access 14 days before launch.";
}

</script>
</body>
</html>
