<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Lane</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:black;
color:white;
font-family:'Inter',sans-serif;
overflow:hidden;
cursor:none;
}

.cursor{
position:fixed;
width:18px;height:18px;
border:2px solid gold;
border-radius:50%;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 20px gold;
z-index:9999;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:90%;
}

h1{
font-family:'Playfair Display',serif;
font-size:clamp(40px,8vw,80px);
letter-spacing:10px;
}

input{
margin-top:15px;
padding:12px;
border-radius:30px;
border:none;
width:260px;
text-align:center;
}

button{
margin-top:20px;
padding:12px 35px;
border-radius:40px;
border:none;
background:linear-gradient(45deg,#d4af37,#f5e6a3);
color:black;
cursor:pointer;
}

.gold{color:gold;border:2px solid gold;}

#shop{
display:none;
padding:80px 30px;
height:100vh;
overflow:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:40px;
}

.product{
background:#111;
padding:20px;
border-radius:20px;
}

.cart{
position:fixed;
top:20px;
right:20px;
background:#111;
padding:20px;
border-radius:20px;
width:220px;
}
.smoke{
position:fixed;
width:4px;height:4px;
background:white;
opacity:.1;
border-radius:50%;
animation:float 10s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}
.flash{
position:fixed;
width:100%;height:100%;
background:white;
opacity:0;
z-index:20;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="flash" id="flash"></div>

<audio id="heartbeat" src="https://assets.mixkit.co/sfx/preview/mixkit-heart-beat-1369.mp3" loop></audio>

<div id="intro" class="center">
<h1>RICH LANE</h1>
<button onclick="enterLaunch()">ENTER</button>
</div>

<div id="launch" class="center" style="display:none;">
<h1 id="timer">01:00</h1>
<input id="email" placeholder="Enter Gmail">
<br>
<input id="code" placeholder="Early Access Code">
<div id="codesLeft">Codes left: 150</div>
<br>
<a href="https://instagram.com/RichLaneCo" target="_blank" style="color:gold;">Instagram</a>
</div>

<div id="welcome" class="center" style="display:none;">
<h1>Välkommen till Rich Lane</h1>
<button onclick="openShop()">ENTER</button>
</div>

<div id="shop">
<h1>RICH LANE</h1>
<div class="products" id="products"></div>
</div>

<div class="cart" id="cartBox">
<h3>Cart</h3>
<div id="cartItems"></div>
<div id="total"></div>
</div>

<script>

/* Cursor */
document.addEventListener("mousemove",e=>{
cursor.style.left=e.pageX+"px";
cursor.style.top=e.pageY+"px";
});

/* Smoke */
for(let i=0;i<50;i++){
let s=document.createElement("div");
s.className="smoke";
s.style.left=Math.random()*100+"%";
s.style.animationDuration=5+Math.random()*10+"s";
document.body.appendChild(s);
}

/* Enter Launch */
function enterLaunch(){
intro.style.display="none";
launch.style.display="block";
heartbeat.play();
startTimer();
}

/* Timer */
let seconds=60;
let codes=150;
function startTimer(){
let interval=setInterval(()=>{
seconds--;
let m=Math.floor(seconds/60);
let s=seconds%60;
timer.innerText=`0${m}:${s<10?"0"+s:s}`;

if(seconds<=0){
clearInterval(interval);
glitchBreak();
}
},1000);
}

/* Validation */
email.addEventListener("input",()=>{
if(email.value.endsWith("@gmail.com")){
email.classList.add("gold");
}else{
email.classList.remove("gold");
}
});

code.addEventListener("input",()=>{
if(code.value==="RICHLANE"){
code.classList.add("gold");
}else{
code.classList.remove("gold");
}
});

/* Glitch Break */
function glitchBreak(){
launch.style.animation="shake .1s infinite";
setTimeout(()=>{
launch.style.display="none";
glassExplosion();
},2000);
}

/* Glass Explosion */
function glassExplosion(){
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);
camera.position.z=5;

let pieces=[];
for(let i=0;i<100;i++){
let geo=new THREE.BoxGeometry(.4,.4,.05);
let mat=new THREE.MeshBasicMaterial({color:0xffffff});
let mesh=new THREE.Mesh(geo,mat);
mesh.position.set((Math.random()-0.5)*4,(Math.random()-0.5)*4,0);
scene.add(mesh);
pieces.push(mesh);
}

let frames=0;
function animate(){
requestAnimationFrame(animate);
pieces.forEach(p=>{
p.position.z+=0.3;
p.rotation.x+=0.1;
});
renderer.render(scene,camera);
frames++;
if(frames>60){
renderer.domElement.remove();
flashbang();
}
}
animate();
}

/* Flashbang */
function flashbang(){
flash.style.opacity=1;
setTimeout(()=>{
flash.style.opacity=0;
welcome.style.display="block";
},1000);
}

/* Open Shop */
function openShop(){
welcome.style.display="none";
shop.style.display="block";
document.body.style.overflow="auto";
loadProducts();
}

/* Shop */
let cart=[];
function loadProducts(){
let data=[
{name:"Luxury Hoodie",price:1299},
{name:"Signature Tee",price:699},
{name:"Premium Jacket",price:2499}
];
data.forEach(p=>{
let div=document.createElement("div");
div.className="product";
div.innerHTML=`
<h3>${p.name}</h3>
<p>${p.price} SEK</p>
<button onclick='addToCart("${p.name}",${p.price})'>Add</button>
`;
products.appendChild(div);
});
}

function addToCart(name,price){
cart.push({name,price});
renderCart();
}

function renderCart(){
cartItems.innerHTML="";
let total=0;
cart.forEach(i=>{
total+=i.price;
cartItems.innerHTML+=`${i.name} - ${i.price}<br>`;
});
document.getElementById("total").innerText="Total: "+total+" SEK";
}

</script>
</body>
</html>
