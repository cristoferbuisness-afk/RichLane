<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rich Lane</title>

  <meta name="description" content="Rich Lane represents discipline, focus, and earned position. Premium apparel for those who lead with confidence and move with intention. Not for everyone.">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="Rich Lane clothes Photo Clouds.png">
  <link rel="apple-touch-icon" href="Rich Lane clothes Photo Clouds.png">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 900px;
    }

    img {
      width: 320px;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 52px;
      letter-spacing: 8px;
      margin: 0;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-top: 12px;
    }

    .coming-soon {
      margin-top: 30px;
      opacity: 0;
      letter-spacing: 4px;
      animation: fadeUp 2s ease forwards;
      animation-delay: 1.5s;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 0.5;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="Rich Lane clothes Photo Clouds.png" alt="Rich Lane">

    <h1>RICH LANE</h1>

    <p>Discipline. Precision. Position.</p>
    <p>Not for everyone.</p>

    <p class="coming-soon">COMING SOON</p>
  </div>
</body>
</html>
